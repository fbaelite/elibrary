            }

                : "https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?auto=format&fit=crop&q=80&w=600";

                                onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?auto=format&fit=crop&q=80&w=600';"
                                class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                            />

                                <span class="px-3.5 py-1.5 rounded-full text-[10px] font-black uppercase tracking-wider shadow-sm backdrop-blur-md ${badgeStyle}">
                                    ${doc.genre}
                                </span>
                            </div>
                        </div>

                        <!-- Tên tài liệu -->
                        <h3 class="text-base font-bold text-primary leading-snug mb-3 group-hover:text-accent transition-colors line-clamp-2" title="${doc.title}">

                        </h3>

                        <!-- Người đóng góp -->

                        </div>
