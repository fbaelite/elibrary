    <script type="text/babel">
      const { useState, useEffect, useMemo, useRef } = React;
      const fMotion = window.Motion || window.FramerMotion;
      const motion =
        fMotion && fMotion.motion
          ? fMotion.motion
          : new Proxy(
              {},
              {
                get: (target, prop) => {
                  return (props) => <div {...props} />;
                },
              },
            );
      const AnimatePresence =
        (fMotion && fMotion.AnimatePresence) || (({ children }) => children);

      // Custom Icon Component compatible with browser-loaded Lucide
      const Icon = ({ name, className = "w-6 h-6", ...props }) => {
        useEffect(() => {
          if (window.lucide) window.lucide.createIcons();
        }, [name]);
        return (
          <span
            key={name}
            className="inline-flex items-center justify-center shrink-0"
          >
            <i
              data-lucide={name.toLowerCase()}
              className={className}
              {...props}
            ></i>
          </span>
        );
      };

      const ThemeToggle = () => {
        const [isDark, setIsDark] = useState(() => {
          if (typeof window !== "undefined") {
            const saved = localStorage.getItem("theme");
            if (saved) return saved === "dark";
            return document.documentElement.classList.contains("dark");
          }
          return false;
        });

        useEffect(() => {
          const root = document.documentElement;
          if (isDark) {
            root.classList.add("dark");
            localStorage.setItem("theme", "dark");
          } else {
            root.classList.remove("dark");
            localStorage.setItem("theme", "light");
          }
        }, [isDark]);

        const handleToggle = (e) => {
          const nextDark = !isDark;

          if (!document.startViewTransition) {
            setIsDark(nextDark);
            return;
          }

          const x = e.clientX ?? (window.innerWidth / 2);
          const y = e.clientY ?? (window.innerHeight / 2);
          const endRadius = Math.hypot(
            Math.max(x, window.innerWidth - x),
            Math.max(y, window.innerHeight - y)
          );

          const transition = document.startViewTransition(() => {
            const root = document.documentElement;
            if (nextDark) {
              root.classList.add("dark");
              localStorage.setItem("theme", "dark");
            } else {
              root.classList.remove("dark");
              localStorage.setItem("theme", "light");
            }
            ReactDOM.flushSync(() => {
              setIsDark(nextDark);
            });
          });

          transition.ready.then(() => {
            document.documentElement.animate(
              {
                clipPath: [
                  `circle(0px at ${x}px ${y}px)`,
                  `circle(${endRadius}px at ${x}px ${y}px)`,
                ],
              },
              {
                duration: 650,
                easing: "cubic-bezier(0.4, 0, 0.2, 1)",
                pseudoElement: "::view-transition-new(root)",
              }
            );
          });
        };

        return (
          <div
            onClick={handleToggle}
            className="relative w-16 h-8 rounded-full p-1 transition-all duration-500 cursor-pointer overflow-hidden shadow-[inset_0_2px_4px_rgba(0,0,0,0.2)] flex items-center bg-sky-400 dark:bg-slate-900 border border-sky-300 dark:border-slate-700 group ring-offset-2 focus:ring-2 focus:ring-accent outline-none"
            title={isDark ? "Switch to Light Mode" : "Switch to Dark Mode"}
          >
            {/* Stars for Dark Mode */}
            <div
              className={`absolute inset-0 transition-opacity duration-700 ${isDark ? "opacity-100" : "opacity-0"}`}
            >
              <div className="absolute top-1 left-3 w-0.5 h-0.5 bg-white rounded-full animate-pulse"></div>
              <div className="absolute top-4 left-6 w-1 h-1 bg-white rounded-full animate-pulse delay-75"></div>
              <div className="absolute top-2 right-4 w-0.5 h-0.5 bg-white rounded-full animate-pulse delay-150"></div>
              <div className="absolute top-5 right-6 w-0.5 h-0.5 bg-white rounded-full animate-pulse delay-300"></div>
            </div>

            {/* Clouds for Light Mode */}
            <div
              className={`absolute inset-0 transition-opacity duration-700 ${isDark ? "opacity-0" : "opacity-100"}`}
            >
              <div className="absolute top-4 left-5 w-4 h-2 bg-white/60 rounded-full animate-bounce duration-[3000ms]"></div>
              <div className="absolute top-2 right-4 w-5 h-2 bg-white/40 rounded-full animate-bounce duration-[4000ms]"></div>
            </div>

            {/* Handle (Sun/Moon) */}
            <motion.div
              animate={{ x: isDark ? 32 : 0 }}
              transition={{ type: "spring", stiffness: 300, damping: 20 }}
              className={`relative w-6 h-6 rounded-full shadow-lg flex items-center justify-center ${isDark ? "bg-slate-200" : "bg-yellow-400"}`}
            >
              {isDark ? (
                <div className="w-4 h-4 rounded-full bg-slate-300 relative overflow-hidden">
                  <div className="absolute top-1 left-1 w-1.5 h-1.5 bg-slate-400/40 rounded-full"></div>
                  <div className="absolute bottom-1 right-1.5 w-1 h-1 bg-slate-400/40 rounded-full"></div>
                </div>
              ) : (
                <div className="w-5 h-5 rounded-full bg-yellow-300 blur-[0.5px]"></div>
              )}
            </motion.div>
          </div>
        );
      };

      const HeaderInfo = ({ className = "justify-center", isHome = false }) => {
        const [time, setTime] = useState(new Date());
        const [weather, setWeather] = useState(null);

        useEffect(() => {
          const timer = setInterval(() => {
            setTime(new Date());
          }, 1000);
          return () => clearInterval(timer);
        }, []);

        useEffect(() => {
          const fetchWeather = async () => {
            try {
              const res = await fetch(
                "https://api.open-meteo.com/v1/forecast?latitude=21.0221&longitude=105.8019&current=temperature_2m,weather_code",
              );
              const data = await res.json();
              setWeather({
                temp: Math.round(data.current.temperature_2m),
                code: data.current.weather_code,
              });
            } catch (error) {
              console.error("Failed to fetch weather:", error);
            }
          };
          fetchWeather();
          const weatherTimer = setInterval(fetchWeather, 600000);
          return () => clearInterval(weatherTimer);
        }, []);

        const formatTime = (date) => {
          return date.toLocaleTimeString("en-US", {
            hour12: false,
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            timeZone: "Asia/Ho_Chi_Minh",
          });
        };

        const getWeatherIcon = (code) => {
          if (code === 0) return "☀️";
          if (code <= 3) return "⛅";
          if (code <= 48) return "🌫️";
          if (code <= 67) return "🌧️";
          if (code <= 77) return "❄️";
          if (code <= 82) return "🌧️";
          if (code <= 99) return "⛈️";
          return "⛅";
        };

        const textColor = isHome
          ? "text-white/80"
          : "text-primary dark:text-gray-300";

        return (
          <div
            className={`flex items-center space-x-6 ${textColor} text-xs md:text-base font-black uppercase tracking-[0.2em] mb-4 animate-fade-in relative z-20 ${className}`}
          >
            <div className="flex items-center">
              <Icon name="Clock" className="w-4 h-4 mr-2 text-accent" />
              <span>Hanoi: {formatTime(time)}</span>
            </div>
            <div className="flex items-center">
              <Icon name="Cloud-Sun" className="w-4 h-4 mr-2 text-accent" />
              <span>
                {weather
                  ? `${getWeatherIcon(weather.code)} ${weather.temp}°C`
                  : "Chùa Láng..."}
              </span>
              <span className="ml-2 text-[10px] opacity-60">

        const cleanHierarchy = (hierarchy) => {
          const cleaned = {};
          for (const [program, branches] of Object.entries(hierarchy)) {
            cleaned[program] = {};
            for (const [branch, subjects] of Object.entries(branches)) {
              if (Array.isArray(subjects)) {
                const cleanedSubjects = subjects
                  .map(subj => {
                    const activeDocs = (subj.documents || []).filter(doc => {
                      const isPrivateDrive = doc.link && (
                        doc.link.includes("1aNfz5hWkX1qXLVvd6Vho7vPQBCk93pC5")
                      );
                      return !isPrivateDrive;
                    });
                    return { ...subj, documents: activeDocs };
                  })
                  .filter(subj => subj.documents && subj.documents.length > 0);

                if (cleanedSubjects.length > 0) {
                  cleaned[program][branch] = cleanedSubjects;
                }
              }
            }
          }
          return cleaned;
        };

      // BACKGROUND MUSIC MENU COMPONENT (Simplified Standard HTML5 Autoplay & Hover Controller with Ambient Synth Fallback)
      const BackgroundMusicMenu = () => {
        const [activeOption, setActiveOption] = useState("none"); // "co-loi" | "k-loi" | "none"
        const [isPlaying, setIsPlaying] = useState(false);
        const [isOpen, setIsOpen] = useState(false);
        const [volume, setVolume] = useState(0.5); // ranges 0.0 to 1.0 (representing 0% to 100%)
        const [coLoiStart, setCoLoiStart] = useState(62);
        const [kLoiStart, setKLoiStart] = useState(42);

        const synthIntervalRef = useRef(null);
        const audioCtxRef = useRef(null);
        const masterGainRef = useRef(null);
        const volumeRef = useRef(volume);

        // Keep volume ref and active master gain synchronized
        useEffect(() => {
          volumeRef.current = volume;
          if (masterGainRef.current && audioCtxRef.current) {
            try {
              masterGainRef.current.gain.setValueAtTime(volume * 0.5 * 0.12, audioCtxRef.current.currentTime);
            } catch (e) {
              // ignore transient errors
            }
          }
        }, [volume]);

        // Stop synthesizer
        const stopSynth = () => {
          if (synthIntervalRef.current) {
            clearInterval(synthIntervalRef.current);
            synthIntervalRef.current = null;
          }
          if (audioCtxRef.current && audioCtxRef.current.state !== "closed") {
            try {
              audioCtxRef.current.suspend();
            } catch (e) {
              console.warn("Failed suspending context", e);
            }
          }
        };

        // Start Web Audio Ambient Synth for immersive atmosphere
        const startSynth = (type) => {
          stopSynth();

          try {
            if (!audioCtxRef.current) {
              audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
            }
            const ctx = audioCtxRef.current;
            if (ctx.state === "suspended") {
              ctx.resume();
            }

            // Master Volume Gain
            const masterGain = ctx.createGain();
            masterGain.gain.setValueAtTime(volumeRef.current * 0.5 * 0.12, ctx.currentTime);
            masterGain.connect(ctx.destination);
            masterGainRef.current = masterGain;

            // Reverb/Delay Simulation
            const delay = ctx.createDelay();
            delay.delayTime.setValueAtTime(0.4, ctx.currentTime);
            const feedback = ctx.createGain();
            feedback.gain.setValueAtTime(0.4, ctx.currentTime);

            delay.connect(feedback);
            feedback.connect(delay);
            masterGain.connect(delay);
            delay.connect(ctx.destination);

            let step = 0;

            const playNote = () => {
              if (!audioCtxRef.current || audioCtxRef.current.state === "suspended") return;
              const now = ctx.currentTime;

              // Calm progression: Cmaj9 -> Am9 -> Fmaj9 -> G9
              let chords = [];
              if (step === 0) chords = [130.81, 164.81, 196.00, 246.94, 293.66]; // C3, E3, G3, B3, D4
              else if (step === 1) chords = [110.00, 130.81, 164.81, 196.00, 246.94]; // A2, C3, E3, G3, B3
              else if (step === 2) chords = [87.31, 110.00, 130.81, 164.81, 196.00]; // F2, A2, C3, E3, G3
              else chords = [98.00, 123.47, 146.83, 174.61, 220.00]; // G2, B2, D3, F3, A3

              // Soft low-pass filtered triangle pads for relaxing ambient atmosphere
              chords.forEach((freq, idx) => {
                const osc = ctx.createOscillator();
                const filter = ctx.createBiquadFilter();
                const gain = ctx.createGain();

                osc.type = "triangle";
                osc.frequency.setValueAtTime(freq, now);

                filter.type = "lowpass";
                filter.frequency.setValueAtTime(450, now);

                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.04 - (idx * 0.005), now + 1.5);
                gain.gain.setValueAtTime(0.04 - (idx * 0.005), now + 3.5);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 5.5);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(masterGain);

                osc.start(now);
                osc.stop(now + 6.0);
              });

              // Add sparkling bright piano/bell chimes (Pentatonic Scale)
              const scale = [523.25, 587.33, 659.25, 783.99, 880.00, 1046.50]; // C5, D5, E5, G5, A5, C6
              for (let i = 0; i < 3; i++) {
                const triggerTime = now + i * 1.2;
                const randomNote = scale[Math.floor(Math.random() * scale.length)];

                const bellOsc = ctx.createOscillator();
                const bellFilter = ctx.createBiquadFilter();
                const bellGain = ctx.createGain();

                bellOsc.type = "sine";
                bellOsc.frequency.setValueAtTime(randomNote, triggerTime);

                bellFilter.type = "lowpass";
                bellFilter.frequency.setValueAtTime(1200, triggerTime);

                bellGain.gain.setValueAtTime(0, triggerTime);
                bellGain.gain.linearRampToValueAtTime(0.03, triggerTime + 0.08);
                bellGain.gain.exponentialRampToValueAtTime(0.0001, triggerTime + 1.8);

                bellOsc.connect(bellFilter);
                bellFilter.connect(bellGain);
                bellGain.connect(masterGain);

                bellOsc.start(triggerTime);
                bellOsc.stop(triggerTime + 2.0);
              }

              // Custom hum vocal simulation for Co-loi
              if (type === "co-loi") {
                const vocalMelody = [261.63, 293.66, 329.63, 392.00, 440.00]; // C4, D4, E4, G4, A4
                const notePitch = vocalMelody[Math.floor(Math.random() * vocalMelody.length)];

                const vocalOsc = ctx.createOscillator();
                const vocalGain = ctx.createGain();
                const formantFilter = ctx.createBiquadFilter();

                vocalOsc.type = "sawtooth";
                vocalOsc.frequency.setValueAtTime(notePitch, now + 0.5);

                // Add nice vocal vibrato
                const vibratoOsc = ctx.createOscillator();
                const vibratoGain = ctx.createGain();
                vibratoOsc.frequency.setValueAtTime(5.5, now);
                vibratoGain.gain.setValueAtTime(3.5, now);
                vibratoOsc.connect(vibratoGain);
                vibratoGain.connect(vocalOsc.frequency);
                vibratoOsc.start(now);
                vibratoOsc.stop(now + 4.5);

                formantFilter.type = "bandpass";
                formantFilter.frequency.setValueAtTime(320, now + 0.5); // Warm vowel formant
                formantFilter.Q.setValueAtTime(4.0, now + 0.5);

                vocalGain.gain.setValueAtTime(0, now + 0.5);
                vocalGain.gain.linearRampToValueAtTime(0.05, now + 1.2);
                vocalGain.gain.setValueAtTime(0.05, now + 3.0);
                vocalGain.gain.exponentialRampToValueAtTime(0.0001, now + 4.5);

                vocalOsc.connect(formantFilter);
                formantFilter.connect(vocalGain);
                vocalGain.connect(masterGain);

                vocalOsc.start(now + 0.5);
                vocalOsc.stop(now + 4.5);
              }

              step = (step + 1) % 4;
            };

            playNote();
            synthIntervalRef.current = setInterval(playNote, 5000);
          } catch (e) {
            console.error("Synthesizer initialization error:", e);
          }
        };

        // Synchronize volume slider dynamically
        useEffect(() => {
          const coloiFrame = document.getElementById("yt-player-coloi");
          const kloiFrame = document.getElementById("yt-player-kloi");
          const ytVolume = Math.round(volume * 100);

          try {
            if (coloiFrame && coloiFrame.contentWindow) {
              coloiFrame.contentWindow.postMessage(JSON.stringify({ event: 'command', func: 'setVolume', args: [ytVolume] }), '*');
            }
          } catch (e) {}

          try {
            if (kloiFrame && kloiFrame.contentWindow) {
              kloiFrame.contentWindow.postMessage(JSON.stringify({ event: 'command', func: 'setVolume', args: [ytVolume] }), '*');
            }
          } catch (e) {}
        }, [volume, activeOption]);

        useEffect(() => {
          return () => {
            stopSynth();
          };
        }, []);

        const handlePlayCoLoi = () => {
          stopSynth();
          // Randomize start time between 30 and 1200 seconds for Co loi
          const randomStart = Math.floor(Math.random() * (1200 - 30 + 1)) + 30;
          setCoLoiStart(randomStart);
          setActiveOption("co-loi");
          setIsPlaying(true);
        };

        const handlePlayKLoi = () => {
          stopSynth();
          // Randomize start time between 30 and 1200 seconds for K loi
          const randomStart = Math.floor(Math.random() * (1200 - 30 + 1)) + 30;
          setKLoiStart(randomStart);
          setActiveOption("k-loi");
          setIsPlaying(true);
        };

        const handleNoSound = () => {
          stopSynth();
          setActiveOption("none");
          setIsPlaying(false);
        };

        return (
          <div className="relative">
            {/* Seamless hover container designed to keep states constant without flickering */}
            <div
              onMouseEnter={() => setIsOpen(true)}
              onMouseLeave={() => setIsOpen(false)}
              className="fixed bottom-6 right-6 z-[9999] flex flex-col items-end gap-2"
            >
              {/* Floating Music Control Card */}
              <div
                className={`transition-all duration-300 transform origin-bottom-right ${
                  isOpen
                    ? "opacity-100 scale-100 translate-y-0 pointer-events-auto"
                    : "opacity-0 scale-95 translate-y-4 pointer-events-none absolute"
                } bg-white/95 dark:bg-slate-900/95 backdrop-blur-md border border-slate-200/80 dark:border-slate-800/80 shadow-2xl rounded-2xl p-4 w-72 mb-1`}
              >
                <div className="flex items-center justify-between mb-3 pb-2 border-b border-slate-100 dark:border-slate-800/50">
                  <span className="text-[10px] uppercase font-black tracking-wider text-slate-400 dark:text-slate-500">
                    Nhạc nền
                  </span>
                  <div className="flex h-1.5 w-1.5 relative">
                    {isPlaying && (
                      <>
                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-accent opacity-75"></span>
                        <span className="relative inline-flex rounded-full h-1.5 w-1.5 bg-accent"></span>
                      </>
                    )}
                  </div>
                </div>

                <div className="space-y-2">
                  {/* Nhạc có lời button */}
                  <button
                    onClick={handlePlayCoLoi}
                    className={`w-full flex items-center justify-between px-3 py-2.5 rounded-xl border transition-all text-xs font-black text-left cursor-pointer ${
                      activeOption === "co-loi"
                        ? "bg-accent border-accent text-white shadow-lg shadow-accent/20"
                        : "bg-slate-50 dark:bg-slate-800/40 hover:bg-slate-100 dark:hover:bg-slate-800 border-slate-100 dark:border-slate-700/60 text-slate-700 dark:text-slate-200"
                    }`}
                  >
                    <div className="flex items-center gap-2.5">
                      <Icon name="Headphones" className="w-3.5 h-3.5" />
                      <span>Nhạc có lời</span>
                    </div>
                    {activeOption === "co-loi" && isPlaying && (
                      <span className="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span>
                    )}
                  </button>

                  {/* Nhạc không lời button */}
                  <button
                    onClick={handlePlayKLoi}
                    className={`w-full flex items-center justify-between px-3 py-2.5 rounded-xl border transition-all text-xs font-black text-left cursor-pointer ${
                      activeOption === "k-loi"
                        ? "bg-accent border-accent text-white shadow-lg shadow-accent/20"
                        : "bg-slate-50 dark:bg-slate-800/40 hover:bg-slate-100 dark:hover:bg-slate-800 border-slate-100 dark:border-slate-700/60 text-slate-700 dark:text-slate-200"
                    }`}
                  >
                    <div className="flex items-center gap-2.5">
                      <Icon name="Sparkles" className="w-3.5 h-3.5" />
                      <span>Nhạc không lời</span>
                    </div>
                    {activeOption === "k-loi" && isPlaying && (
                      <span className="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span>
                    )}
                  </button>

                  {/* Tắt tiếng button */}
                  <button
                    onClick={handleNoSound}
                    className={`w-full flex items-center justify-between px-3 py-2.5 rounded-xl border transition-all text-xs font-black text-left cursor-pointer ${
                      activeOption === "none"
                        ? "bg-red-500 border-red-500 text-white shadow-lg shadow-red-500/20"
                        : "bg-slate-50 dark:bg-slate-800/40 hover:bg-slate-100 dark:hover:bg-slate-800 border-slate-100 dark:border-slate-700/60 text-slate-700 dark:text-slate-200"
                    }`}
                  >
                    <div className="flex items-center gap-2.5">
                      <Icon name="Volume-X" className="w-3.5 h-3.5" />
                      <span>Tắt tiếng</span>
                    </div>
                    {activeOption === "none" && (
                      <span className="w-1.5 h-1.5 rounded-full bg-white"></span>

                {/* Styled Volume Control Slider */}
                <div className="mt-4 pt-3 border-t border-slate-100 dark:border-slate-800/50">

                  <div className="flex items-center gap-2">
                    <button
                      onClick={() => setVolume(0)}

                    </button>
                    <input
                      type="range"
                      min="0"

                      step="0.01"
                      value={volume}
                      onChange={(e) => setVolume(parseFloat(e.target.value))}
                      className="w-full h-1 bg-slate-100 dark:bg-slate-800 rounded-lg appearance-none cursor-pointer accent-accent"
                    />
                    <button
                      onClick={() => setVolume(1)}
                      title="Max Volume"
                      className="text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 transition-colors cursor-pointer"
                    >
                      <Icon name="Volume-2" className="w-3.5 h-3.5" />
                    </button>
                  </div>
                </div>

                {/* VISUAL YOUTUBE MINI PLAYER CONTROLLERS */}
                {activeOption !== "none" && (
                  <div className="mt-4 pt-3 border-t border-slate-100 dark:border-slate-800/50">
                    <div className="rounded-xl overflow-hidden border border-slate-200/60 dark:border-slate-800/60 shadow-lg aspect-video bg-black w-full relative">
                      {activeOption === "co-loi" ? (
                        <iframe

                          className="w-full h-full"
                          src={`https://www.youtube.com/embed/8O-1qB-fxjc?playlist=8O-1qB-fxjc&enablejsapi=1&autoplay=1&loop=1&start=${coLoiStart}&mute=0`}
                          allow="autoplay; encrypted-media"
                        />
                      ) : (
                        <iframe
                          id="yt-player-kloi"
                          className="w-full h-full"
                          src={`https://www.youtube.com/embed/fslL-sjPr5g?playlist=fslL-sjPr5g&enablejsapi=1&autoplay=1&loop=1&start=${kLoiStart}&mute=0`}
                          allow="autoplay; encrypted-media"
                        />
                      )}
                    </div>
                    <div className="mt-2 bg-slate-50 dark:bg-slate-800/30 p-2 rounded-xl border border-slate-100 dark:border-slate-700/30">
                      <p className="text-[9px] text-slate-500 dark:text-slate-400 leading-normal font-medium text-center">
                        💡 Click nút <span className="text-red-500 font-bold">Play (Đỏ)</span> trên màn hình video để bật tiếng nếu trình duyệt chặn tự phát âm thanh.

              </div>

              {/* Main Center Floating Toggle Trigger Button */}
              <button
                onClick={() => setIsOpen(!isOpen)}

                  }`}

      // MAIN APP ROUTER (State-Based)
      const App = () => {
        const [activePage, setActivePage] = useState("home");
        const [toast, setToast] = useState(null);
        const [selectedRecommendationItem, setSelectedRecommendationItem] = useState(null);
        const [studySpaceDeepLink, setStudySpaceDeepLink] = useState(null);

        const getRelatedRecommendationItems = (item) => {
          if (!item) return [];
          const extended = getExtendedResources();
          
          // Filter out the selected item itself and non-hyperlinks
          const candidates = extended.filter(
            (c) =>
              c.id !== item.id &&
              c.link &&
              c.link.startsWith("http") &&
              c.title.toLowerCase() !== item.title.toLowerCase()
          );

          // Score candidate items based on similarity
          const scored = candidates.map((c) => {
            let score = 0;
            
            // Tag matches
            if (item.tags && c.tags) {
              const matches = item.tags.filter((t) => c.tags.includes(t));
              score += matches.length * 5;
            }

            // Category match (e.g. "book")
            if (c.category === item.category) {
              score += 1;
            }

            // Word matching in titles
            const itemWords = item.title.toLowerCase().split(/[\s,.\-_():]+/);
            const cWords = c.title.toLowerCase().split(/[\s,.\-_():]+/);
            itemWords.forEach((iw) => {
              if (iw.length > 2 && cWords.includes(iw)) {
                score += 3;
              }
            });

            return { item: c, score };
          });

          // Sort descending and take top 3
          const matches = scored
            .filter((p) => p.score > 0)
            .sort((a, b) => b.score - a.score)
            .map((p) => p.item);

          if (matches.length >= 2) {
            return matches.slice(0, 3);
          }

          // Fallback matches
          return candidates.slice(0, 3);
        };

        const triggerToast = (msg) => {
          setToast(msg);
          setTimeout(() => {
            setToast((current) => (current === msg ? null : current));
          }, 4000);
        };

        useEffect(() => {
          window.scrollTo(0, 0);
        }, [activePage]);

        const renderContent = () => {
          if (activePage.startsWith("elearning-detail-")) {
            const id = activePage.replace("elearning-detail-", "");
            return <CourseDetailPage id={id} setActivePage={setActivePage} />;
          }
          switch (activePage) {
            case "home":
              return (
                <HomePage
                  setActivePage={setActivePage}
                  setSelectedRecommendationItem={setSelectedRecommendationItem}
                  setStudySpaceDeepLink={setStudySpaceDeepLink}
                />
              );
            case "elibrary":
            case "elibrary-studyspace":
            case "elibrary-studyspace-tieuchuan":
            case "elibrary-studyspace-clc":
            case "elibrary-studyspace-tientien":
            case "elibrary-studyspace-khachsan":
              return (
                <ELibraryPage
                  setActivePage={setActivePage}
                  activePage={activePage}
                  setSelectedRecommendationItem={setSelectedRecommendationItem}
                  studySpaceDeepLink={studySpaceDeepLink}
                  setStudySpaceDeepLink={setStudySpaceDeepLink}
                />
              );
            case "share-library":
              return <ShareLibraryPage setActivePage={setActivePage} />;
            case "development":
              return <DevelopmentPage setActivePage={setActivePage} />;
            case "elearning":
              return <ELearningPage setActivePage={setActivePage} />;
            case "emagazine":
              return <EMagazinePage />;
            case "guide":
              return <GuidePage />;
            case "about":
              return <AboutPage />;
            default:
              return (
                <HomePage
                  setActivePage={setActivePage}
                  setSelectedRecommendationItem={setSelectedRecommendationItem}
                  setStudySpaceDeepLink={setStudySpaceDeepLink}
                />
              );
          }
        };

        return (
          <div className="flex flex-col min-h-screen dark:bg-transparent">
            {/* Background Layer with drifting clouds */}
            <div className="background-effects">
              <div className="cloud cloud1"></div>
              <div className="cloud cloud2"></div>
              <div className="cloud cloud3"></div>
            </div>

            <Navbar
              activePage={activePage}
              setActivePage={setActivePage}
              triggerToast={triggerToast}
            />
            <main className="flex-grow">{renderContent()}</main>
            <Footer />

            {/* Elite Recommendation Modal */}
            <AnimatePresence>
              {selectedRecommendationItem && (
                <motion.div
                  initial={{ opacity: 0 }}
                  animate={{ opacity: 1 }}
                  exit={{ opacity: 0 }}
                  className="fixed inset-0 z-[10000] flex items-center justify-center p-4 bg-slate-950/70 backdrop-blur-xl"
                  onClick={() => setSelectedRecommendationItem(null)}
                >
                  <motion.div
                    initial={{ scale: 0.95, y: 30 }}
                    animate={{ scale: 1, y: 0 }}
                    exit={{ scale: 0.95, y: 30 }}
                    transition={{ type: "spring", damping: 25, stiffness: 350 }}
                    className="bg-white dark:bg-slate-900 rounded-[32px] w-full max-w-2xl overflow-hidden shadow-2xl border border-primary/10 flex flex-col max-h-[90vh]"
                    onClick={(e) => e.stopPropagation()}
                  >
                    {/* Header */}
                    <div className="p-6 md:p-8 bg-gradient-to-r from-primary to-primary/95 text-white flex justify-between items-center relative overflow-hidden">
                      <div className="absolute top-0 right-0 w-32 h-32 bg-accent/20 rounded-full blur-2xl pointer-events-none"></div>
                      <div>
                        <span className="text-[10px] font-black uppercase tracking-[0.25em] text-accent block mb-1">
                          Trợ lý Elite gợi ý
                        </span>
                        <h4 className="text-xl md:text-2xl font-black uppercase tracking-tight">
                          Khám phá Tài liệu
                        </h4>
                      </div>
                      <button
                        onClick={() => setSelectedRecommendationItem(null)}
                        className="p-3 bg-white/10 hover:bg-white/20 rounded-full transition-all text-white border border-white/10 flex items-center justify-center cursor-pointer"
                      >
                        <Icon name="X" className="w-5 h-5" />
                      </button>
                    </div>

                    {/* Content Scroll Area */}
                    <div className="p-6 md:p-8 overflow-y-auto flex-grow space-y-8 custom-scrollbar">
                      {/* Original Target Doc */}
                      <div className="p-6 bg-gray-50 dark:bg-slate-800/50 rounded-2xl border border-gray-100 dark:border-white/5 relative group">
                        <div className="flex items-start gap-4">
                          <div className="w-12 h-12 rounded-xl bg-accent/10 dark:bg-accent/20 flex items-center justify-center text-accent shrink-0">
                            <Icon name="File-Text" className="w-6 h-6" />
                          </div>
                          <div className="flex-grow min-w-0 font-sans">
                            <h4 className="text-lg font-black text-primary dark:text-white leading-snug uppercase tracking-tight break-words mb-2">
                              {selectedRecommendationItem.title}
                            </h4>
                            <p className="text-sm text-gray-650 dark:text-gray-300 font-medium">
                              {selectedRecommendationItem.description || "Tài liệu học thuyết chuyên sâu của FBA Elite."}
                            </p>
                          </div>
                        </div>

                        <div className="mt-6 flex flex-wrap gap-4 items-center justify-between border-t border-gray-200/50 dark:border-white/5 pt-4">
                          <span className="text-xs font-black text-accent uppercase tracking-wider">
                            Chính xác & Đầy đủ
                          </span>
                          <a
                            href={selectedRecommendationItem.link}
                            target="_blank"
                            referrerPolicy="no-referrer"
                            className="inline-flex items-center gap-2 px-6 py-3 bg-accent hover:bg-accent/90 text-white font-extrabold rounded-xl transition-all shadow-lg shadow-accent/25 text-sm uppercase tracking-wider scale-95 duration-200 active:scale-95 cursor-pointer decoration-transparent"
                          >
                            <span>Truy cập tài liệu</span>
                            <Icon name="External-Link" className="w-4 h-4" />
                          </a>
                        </div>
                      </div>

                      {/* Related Recommendations Block */}
                      <div>
                        <div className="flex items-center gap-2.5 mb-5 px-1 justify-between">
                          <h4 className="text-xs font-black text-primary/60 dark:text-gray-300 uppercase tracking-[0.2em]">
                            Tài Liệu Đọc Thêm Liên Quan
                          </h4>
                          <span className="h-1 bg-primary/10 dark:bg-white/10 flex-grow ml-4 rounded-full"></span>
                        </div>

                        <div className="space-y-3">
                          {getRelatedRecommendationItems(selectedRecommendationItem).map((rec, idx) => (
                            <div
                              key={rec.id || idx}
                              className="p-4 bg-white dark:bg-slate-800 hover:bg-gray-50 dark:hover:bg-slate-750 border border-gray-150 dark:border-white/5 rounded-xl transition-all flex items-center gap-4 justify-between"
                            >
                              <div className="flex items-center gap-3.5 min-w-0">
                                <span className="w-8 h-8 rounded-lg bg-primary/5 dark:bg-white/5 flex items-center justify-center text-primary dark:text-gray-300 font-black text-xs shrink-0 select-none">
                                  0{idx + 1}
                                </span>
                                <div className="min-w-0 font-sans">
                                  <h5 className="text-sm font-extrabold text-primary dark:text-white truncate uppercase tracking-tight">
                                    {rec.title}
                                  </h5>
                                  <p className="text-[10px] text-gray-500 dark:text-gray-400 font-bold uppercase tracking-wider">
                                    {rec.tags?.[1] || "Kỹ năng"} • {rec.tags?.[2] || "Kho tài liệu"}
                                  </p>
                                </div>
                              </div>
                              <a
                                href={rec.link}
                                target="_blank"
                                referrerPolicy="no-referrer"
                                className="px-4 py-2 bg-gray-100 hover:bg-accent hover:text-white text-primary rounded-lg text-xs font-bold uppercase tracking-widest flex items-center gap-1.5 transition-all outline-none decoration-transparent cursor-pointer"
                              >
                                <span>Đọc</span>
                                <Icon name="Arrow-Up-Right" className="w-3.5 h-3.5" />
                              </a>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>

                    {/* Footer Warning */}
                    <div className="p-4 bg-gray-50 dark:bg-slate-950/20 text-center border-t border-gray-100 dark:border-white/5 text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                      Hỗ trợ tối đa năng lực học tập cùng FBA ELITE
                    </div>
                  </motion.div>
                </motion.div>
              )}
            </AnimatePresence>

            {/* Elite Toast Notification */}
            <AnimatePresence>
              {toast && (
                <motion.div
                  initial={{ opacity: 0, y: 50, scale: 0.9 }}
                  animate={{ opacity: 1, y: 0, scale: 1 }}
                  exit={{ opacity: 0, y: 20, scale: 0.9 }}
                  className="fixed bottom-8 right-8 z-[200] max-w-md bg-slate-900/95 dark:bg-slate-950/95 backdrop-blur-xl border border-accent/25 px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-4 text-white"
                >
                  <div className="w-10 h-10 bg-accent/20 rounded-2xl flex items-center justify-center text-accent shrink-0">
                    <Icon name="Alert-Circle" className="w-5 h-5" />
                  </div>
                  <div className="flex-1">
                    <p className="text-xs font-black uppercase tracking-widest text-accent mb-0.5">
                      Thông báo hệ thống
                    </p>
                    <p className="text-sm font-bold text-gray-200 leading-snug">
                      {toast}
                    </p>
                  </div>
                  <button
                    onClick={() => setToast(null)}
                    className="text-white/40 hover:text-white p-1"
                  >
                    <Icon name="X" className="w-4 h-4" />
                  </button>
                </motion.div>
              )}
            </AnimatePresence>

            {/* Radial Fan Menu for Background Music */}
            <BackgroundMusicMenu />
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
